name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: Backend
        run: npm install
      - name: Run backend lint
        working-directory: Backend
        run: npm run lint
      - name: Run backend tests
        working-directory: Backend
        run: npm run test
      - name: Build backend
        working-directory: Backend
        run: npm run build
